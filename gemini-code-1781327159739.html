<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migrasi Data ke Firestore</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-200 p-8 font-sans">

    <div class="max-w-3xl mx-auto bg-slate-800 p-8 rounded-xl border border-slate-700 shadow-2xl">
        <h1 class="text-2xl font-bold text-white mb-2">Alat Migrasi Database Regulasi</h1>
        <p class="text-slate-400 mb-6 text-sm">Menarik data dari Google Sheets (Apps Script) dan memompanya ke database modern Firestore.</p>
        
        <div class="mb-6 p-4 bg-amber-500/10 border border-amber-500/30 rounded-lg text-amber-200 text-sm">
            <strong>Pastikan SCRIPT_URL sudah diisi</strong> di dalam kode HTML ini sebelum menekan tombol mulai.
        </div>

        <button id="btnStart" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-lg w-full transition-all shadow-lg mb-6">
            MULAI PROSES MIGRASI DATA
        </button>

        <div class="bg-slate-950 rounded-lg p-4 font-mono text-xs text-emerald-400 h-64 overflow-y-auto border border-slate-700" id="logBox">
            > Sistem siap. Menunggu perintah migrasi...<br>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Konfigurasi Firebase Anda
        const firebaseConfig = {
            apiKey: "AIzaSyCuSsr4vmYRpruOoXDRB4UhZhjVUTll5DU",
            authDomain: "regulasi-ippi.firebaseapp.com",
            projectId: "regulasi-ippi",
            storageBucket: "regulasi-ippi.firebasestorage.app",
            messagingSenderId: "414189013845",
            appId: "1:414189013845:web:9c1a7b5e915c457b3b3ddc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ==========================================
        // GANTI BAGIAN INI DENGAN URL APPS SCRIPT ANDA
        // ==========================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw9ZJKjnr_yxSxD_8ykZXDDmePBiskt5ieDCE2YJW4--KgLQd75eMBfqILuOAS_tZs0qw/exec"; 

        const tabs = ["Regulasi", "Lingkungan", "K3", "Energi"];
        const logBox = document.getElementById('logBox');
        const btnStart = document.getElementById('btnStart');

        function log(message) {
            logBox.innerHTML += `> ${message}<br>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        btnStart.addEventListener('click', async () => {
            if (SCRIPT_URL.includes("MASUKKAN_URL")) {
                alert("URL Apps Script belum diisi! Silakan edit file HTML ini menggunakan Notepad/VS Code.");
                return;
            }

            btnStart.disabled = true;
            btnStart.classList.replace('bg-blue-600', 'bg-slate-600');
            btnStart.innerText = "PROSES MIGRASI BERJALAN...";

            log("Memulai koneksi ke Google Sheets...");

            for (let tab of tabs) {
                log(`------------- TAB: ${tab.toUpperCase()} -------------`);
                try {
                    log(`Mendownload data dari sheet ${tab}...`);
                    const response = await fetch(`${SCRIPT_URL}?sheet=${tab}`);
                    const data = await response.json();
                    
                    if (data.length > 0 && data[0].ID === "ERROR") {
                        log(`<span class="text-red-400">Error Sheet: ${data[0].TENTANG}</span>`);
                        continue;
                    }

                    log(`Berhasil mendapatkan ${data.length} baris. Mulai memompa ke Firestore...`);
                    
                    let successCount = 0;
                    for (let row of data) {
                        // Hapus variabel internal Apps Script agar tidak ikut masuk ke Firestore
                        delete row.__rowIndex;

                        // Tulis ke koleksi Firestore
                        await addDoc(collection(db, tab), row);
                        successCount++;
                    }
                    log(`Selesai! ${successCount} data berhasil dipompa ke koleksi ${tab}.`);
                    
                } catch (error) {
                    log(`<span class="text-red-400">Gagal memproses ${tab}: ${error.message}</span>`);
                }
            }

            log("=========================================");
            log("MIGRASI SELESAI! Anda bisa menutup halaman ini.");
            btnStart.innerText = "MIGRASI SELESAI";
            btnStart.classList.replace('bg-slate-600', 'bg-emerald-600');
        });
    </script>
</body>
</html>
